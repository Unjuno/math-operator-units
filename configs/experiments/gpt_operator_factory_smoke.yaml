experiment:
  id: gpt_operator_factory_smoke
  output_dir: runs/gpt_operator_factory_smoke
  model_config: configs/model/gpt_operator_1m_v1.yaml
  tokenizer_config: configs/tokenizer/operator_experiment_v1.yaml
  operators:
    - scalar.add
    - aggregation.sum
    - scalar.neg
    - scalar.min
    - scalar.max
  joint_model_id: joint.all_five
  seeds: [0]
  require_cuda: true
  precision: fp32
  max_parameters: 1000000
  deterministic_algorithms: false
  continue_on_error: false

  data:
    operand_min: -16
    operand_max: 16
    min_terms: 3
    max_terms: 4
    numeric_token_min: -1024
    numeric_token_max: 1024

  train:
    batch_size: 8
    max_steps: 3
    eval_every: 1
    eval_batches: 1
    log_every: 1
    checkpoint_every: 1
    checkpoint_steps: [0, 1, 3]
    optimizer:
      learning_rate: 0.0003
      min_learning_rate: 0.00003
      warmup_steps: 1
      weight_decay: 0.1
      beta1: 0.9
      beta2: 0.95
      grad_clip_norm: 1.0
