name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Validate shell launchers
        run: bash -n scripts/run_operator_factory_cuda.sh scripts/watch_operator_factory.sh scripts/run_bias_fusion_factory_surface_v3.sh scripts/watch_bias_fusion_factory_surface_v3.sh
      - name: Audit repository config
        run: opfusion-audit .
      - name: Run tests
        run: pytest -q --junitxml=pytest-report.xml
      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest-report.xml
          if-no-files-found: error
